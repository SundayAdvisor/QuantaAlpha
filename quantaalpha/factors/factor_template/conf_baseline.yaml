# =============================================================================
# QuantaAlpha small backtest config - baseline (first round, base factors only)
#
# Same preprocessing and model params as combined-factor version, and the
# same Alpha158DL 20-feature curated subset — so baseline vs combined is
# apples-to-apples and the IC delta attributes to mined factors. No mined
# factors here (no parquet, no NestedDataLoader).
# =============================================================================

qlib_init:
    provider_uri: "C:/Users/jangh/Desktop/quantconnect/repos/QuantaAlpha/data/qlib/us_data"
    region: us

market: &market sp500
benchmark: &benchmark ^gspc

data_handler_config: &data_handler_config
    start_time: "2008-01-02"
    end_time: "2020-11-10"
    instruments: *market
    data_loader:
        class: qlib.contrib.data.loader.Alpha158DL
        kwargs:
            config:
                label:
                    - ["Ref($close, -2)/Ref($close, -1) - 1"]
                    - ["LABEL0"]
                feature:
                    - ["Resi($close, 5)/$close", "Std(Abs($close/Ref($close, 1)-1)*$volume, 5)/(Mean(Abs($close/Ref($close, 1)-1)*$volume, 5)+1e-12)",
                       "Rsquare($close, 5)", "($high-$low)/$open", "Rsquare($close, 10)", "Corr($close, Log($volume+1), 5)",
                       "Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 5)", "Corr($close, Log($volume+1), 10)",
                       "Ref($close, 60)/$close", "Resi($close, 10)/$close", "Std($volume, 5)/($volume+1e-12)",
                       "Rsquare($close, 60)", "Corr($close, Log($volume+1), 60)", "Std(Abs($close/Ref($close, 1)-1)*$volume, 60)/(Mean(Abs($close/Ref($close, 1)-1)*$volume, 60)+1e-12)",
                       "Std($close, 5)/$close", "Rsquare($close, 20)", "Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 60)",
                       "Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 10)", "Corr($close, Log($volume+1), 20)",
                       "(Less($open, $close)-$low)/$open"]
                    - ["RESI5", "WVMA5", "RSQR5", "KLEN", "RSQR10", "CORR5", "CORD5", "CORR10",
                       "ROC60", "RESI10", "VSTD5", "RSQR60", "CORR60", "WVMA60", "STD5",
                       "RSQR20", "CORD60", "CORD10", "CORR20", "KLOW"]

    learn_processors:
        - class: Fillna
          kwargs:
              fields_group: feature
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: feature
        - class: CSRankNorm
          kwargs:
              fields_group: label

    infer_processors:
        - class: Fillna
          kwargs:
              fields_group: feature
        - class: CSRankNorm
          kwargs:
              fields_group: feature
        - class: CSRankNorm
          kwargs:
              fields_group: label

port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 50
            n_drop: 5
    backtest:
        start_time: "2017-01-03"
        end_time: "2020-11-04"   # leave buffer for t+2 label at calendar end (2020-11-10)
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            codes: *market
            limit_threshold: null
            deal_price: open
            open_cost: 0.0005
            close_cost: 0.0005   # US: commission only (China stamp duty doesn't apply)
            min_cost: 5

task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            colsample_bytree: 0.8879
            learning_rate: 0.05
            subsample: 0.8789
            lambda_l1: 205.6999
            lambda_l2: 580.9768
            max_depth: 8
            num_leaves: 210
            num_threads: 20
            early_stopping_round: 50
            num_boost_round: 500

    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: DataHandlerLP
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: ["2008-01-02", "2015-12-31"]
                valid: ["2016-01-04", "2016-12-30"]
                test: ["2017-01-03", "2020-11-04"]

    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config
